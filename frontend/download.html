<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TIMASAVAGEX · Download</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300&family=Inter:wght@300;400&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', sans-serif;
    background: #0A0806;
    color: #EDE5D0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    text-align: center;
  }
  .box { max-width: 420px; }
  .logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.5rem;
    color: #C9A84C;
    letter-spacing: 0.3em;
    margin-bottom: 2rem;
  }
  h1 { font-size: 1.25rem; font-weight: 400; margin-bottom: 1rem; }
  p { color: #7A6E5A; line-height: 1.8; font-size: 0.9rem; }
  .spinner {
    width: 32px; height: 32px;
    border: 2px solid rgba(201,168,76,0.2);
    border-top-color: #C9A84C;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 1.5rem;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  a { color: #C9A84C; }
</style>
</head>
<body>
<div class="box">
  <div class="logo">TIMASAVAGEX</div>
  <div id="loading">
    <div class="spinner"></div>
    <h1>Preparing your download…</h1>
    <p>Please wait while we verify your link.</p>
  </div>
  <div id="error" style="display:none">
    <h1>Link unavailable</h1>
    <p id="error-msg">This link has expired or is invalid.</p>
    <p style="margin-top:1.5rem"><a href="/">Return to TIMASAVAGEX</a></p>
  </div>
</div>
<script>
  const API_BASE = 'https://timasavagex-production-f18d.up.railway.app';

  const token = window.location.pathname.split('/').pop();

  async function redeem() {
    if (!token || token === 'download.html') {
      showError('Invalid download link.');
      return;
    }
    try {
      const res = await fetch(`${API_BASE}/api/links/${token}`);
      const data = await res.json();
      if (!res.ok || !data.url) {
        showError(data.error || 'This link has expired or is invalid.');
        return;
      }
      window.location.href = data.url;
    } catch {
      showError('Unable to connect. Please try again later.');
    }
  }

  function showError(msg) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error').style.display = 'block';
    document.getElementById('error-msg').textContent = msg;
  }

  redeem();
</script>
</body>
</html>
