<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TIMASAVAGEX Admin</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --gold: #C9A84C;
    --bg: #0A0806;
    --bg2: #0F0C09;
    --surface: #1A1409;
    --text: #EDE5D0;
    --text-muted: #7A6E5A;
    --border: rgba(201,168,76,0.15);
    --danger: #c44;
    --success: #4a8;
  }
  body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  .login-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
  .login-box { background: var(--bg2); border: 1px solid var(--border); padding: 2.5rem; width: 100%; max-width: 380px; }
  .login-box h1 { font-size: 1.5rem; font-weight: 500; margin-bottom: 0.5rem; color: var(--gold); letter-spacing: 0.2em; }
  .login-box p { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 2rem; }
  label { display: block; font-size: 0.7rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 0.5rem; }
  input, select, textarea {
    width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text);
    padding: 0.75rem; font-size: 0.85rem; font-family: inherit; margin-bottom: 1rem;
  }
  input:focus, select:focus, textarea:focus { outline: none; border-color: var(--gold); }
  button, .btn {
    background: var(--gold); color: var(--bg); border: none; padding: 0.75rem 1.25rem;
    font-size: 0.75rem; letter-spacing: 0.15em; text-transform: uppercase; cursor: pointer; font-weight: 500;
  }
  button:hover, .btn:hover { opacity: 0.9; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-sm { padding: 0.4rem 0.75rem; font-size: 0.65rem; }
  .btn-danger { background: var(--danger); color: #fff; }
  .btn-outline { background: transparent; color: var(--gold); border: 1px solid var(--border); }
  .error { color: var(--danger); font-size: 0.8rem; margin-top: 0.5rem; }
  #dashboard { display: none; }
  header {
    padding: 1rem 2rem; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between; background: var(--bg2);
  }
  header h1 { font-size: 1rem; letter-spacing: 0.25em; color: var(--gold); font-weight: 500; }
  .tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); background: var(--bg2); padding: 0 2rem; }
  .tab {
    padding: 1rem 1.5rem; background: none; border: none; color: var(--text-muted);
    cursor: pointer; font-size: 0.75rem; letter-spacing: 0.1em; text-transform: uppercase;
    border-bottom: 2px solid transparent;
  }
  .tab.active { color: var(--gold); border-bottom-color: var(--gold); }
  main { padding: 2rem; max-width: 1200px; margin: 0 auto; }
  .panel { display: none; }
  .panel.active { display: block; }
  table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
  th, td { padding: 0.75rem; text-align: left; border-bottom: 1px solid var(--border); }
  th { color: var(--text-muted); font-weight: 500; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.08em; }
  .badge { display: inline-block; padding: 0.2rem 0.5rem; font-size: 0.7rem; border-radius: 2px; }
  .badge-pending { background: rgba(201,168,76,0.15); color: var(--gold); }
  .badge-verified { background: rgba(68,170,136,0.15); color: var(--success); }
  .badge-rejected { background: rgba(204,68,68,0.15); color: var(--danger); }
  .upload-form { background: var(--surface); border: 1px solid var(--border); padding: 1.5rem; margin-bottom: 2rem; }
  .upload-form h3 { font-size: 0.9rem; margin-bottom: 1rem; font-weight: 500; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  .toggle-row { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 1rem; }
  .toggle-row input { width: auto; margin: 0; }
  .progress-wrap { height: 4px; background: var(--bg); margin: 1rem 0; display: none; }
  .progress-bar { height: 100%; background: var(--gold); width: 0%; transition: width 0.2s; }
  .filter-row { margin-bottom: 1rem; display: flex; gap: 0.5rem; align-items: center; }
  .filter-row select { width: auto; margin: 0; }
  .actions { display: flex; gap: 0.5rem; flex-wrap: wrap; }
  @media (max-width: 768px) {
    .form-row { grid-template-columns: 1fr; }
    main { padding: 1rem; }
    table { font-size: 0.75rem; }
    th, td { padding: 0.5rem; }
  }
  /* Simple modal styles for edit dialog */
  .edit-modal-backdrop { display: none; position: fixed; inset: 0; z-index: 9999; background: rgba(0,0,0,0.7); align-items: center; justify-content: center; }
  .edit-modal { background: var(--bg2); padding: 1.25rem; border: 1px solid var(--border); max-width: 520px; width: 100%; }
  .edit-modal h3 { color: var(--gold); margin-bottom: 0.5rem; }
</style>
</head>
<body>

<div id="login-screen" class="login-wrap">
  <div class="login-box">
    <h1>TIMASAVAGEX</h1>
    <p>Admin dashboard — click below to continue.</p>
    <button onclick="login()" style="width:100%">Sign in</button>
    <p class="error" id="login-error"></p>
  </div>
</div>

<div id="dashboard">
  <header>
    <h1>TIMASAVAGEX ADMIN</h1>
    <button class="btn-outline btn-sm" onclick="logout()">Logout</button>
  </header>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('content')">Content</button>
    <button class="tab" onclick="switchTab('orders')">Orders</button>
  </div>
  <main>
    <div id="panel-content" class="panel active">
      <div class="upload-form">
        <h3>Upload new content</h3>
        <div class="form-row">
          <div>
            <label>Title</label>
            <input type="text" id="upload-title" />
          </div>
          <div>
            <label>Type</label>
            <select id="upload-type">
              <option value="video">Video</option>
              <option value="photo">Photo</option>
              <option value="pdf">PDF</option>
              <option value="call">Call</option>
            </select>
          </div>
        </div>
        <label>Description</label>
        <textarea id="upload-desc" rows="2"></textarea>
        <div class="form-row">
          <div class="toggle-row">
            <input type="checkbox" id="upload-free" onchange="togglePrice()" />
            <label style="margin:0">Free content</label>
          </div>
          <div>
            <label>Price (USD)</label>
            <input type="number" id="upload-price" step="0.01" min="0" value="8" />
          </div>
        </div>
        <div class="form-row">
          <div>
            <label>Content file</label>
            <input type="file" id="upload-file" accept="video/*,image/*,.pdf" />
          </div>
          <div>
            <label>Thumbnail</label>
            <input type="file" id="upload-thumb" accept="image/*" />
          </div>
        </div>
        <div class="progress-wrap" id="upload-progress"><div class="progress-bar" id="progress-bar"></div></div>
        <button onclick="uploadContent()" id="upload-btn">Upload content</button>
      </div>
      <table>
        <thead>
          <tr><th>Title</th><th>Type</th><th>Price</th><th>Free</th><th>Active</th><th>Actions</th></tr>
        </thead>
        <tbody id="content-table"></tbody>
      </table>
    </div>

    <div id="panel-orders" class="panel">
      <div class="filter-row">
        <label style="margin:0">Filter:</label>
        <select id="order-filter" onchange="loadOrders()">
          <option value="all">All orders</option>
          <option value="pending">Pending only</option>
        </select>
        <span style="color:var(--text-muted);font-size:0.75rem;margin-left:auto">Auto-refreshes every 30s</span>
      </div>
      <table>
        <thead>
          <tr><th>Date</th><th>Content</th><th>Telegram</th><th>Method</th><th>TX ID</th><th>Status</th><th>Actions</th></tr>
        </thead>
        <tbody id="orders-table"></tbody>
      </table>
    </div>
  </main>
</div>

<script>
  const API_BASE = 'https://timasavagex-production-f18d.up.railway.app';

  let adminToken = localStorage.getItem('timasavagex_admin_token');
  let ordersInterval = null;
  // store last loaded content list for edit modal
  let lastContentList = null;

  function headers() {
    return { 'X-Admin-Key': adminToken };
  }

  async function login() {
    document.getElementById('login-error').textContent = '';
    try {
      const res = await fetch(`${API_BASE}/api/admin/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({}),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Login failed');
      adminToken = data.token;
      localStorage.setItem('timasavagex_admin_token', adminToken);
      showDashboard();
    } catch (err) {
      document.getElementById('login-error').textContent = err.message;
    }
  }

  function logout() {
    localStorage.removeItem('timasavagex_admin_token');
    adminToken = null;
    document.getElementById('dashboard').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
    if (ordersInterval) clearInterval(ordersInterval);
  }

  function showDashboard() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    loadContent();
    loadOrders();
    ordersInterval = setInterval(loadOrders, 30000);
  }

  if (adminToken) showDashboard();

  function switchTab(name) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.querySelector(`.tab[onclick="switchTab('${name}')"]`).classList.add('active');
    document.getElementById('panel-' + name).classList.add('active');
  }

  function togglePrice() {
    document.getElementById('upload-price').disabled = document.getElementById('upload-free').checked;
  }

  async function loadContent() {
    try {
      const res = await fetch(`${API_BASE}/api/admin/content`, { headers: headers() });
      if (res.status === 401) { logout(); return; }
      const items = await res.json();
      // store for edit modal
      window.lastContentList = items;

      document.getElementById('content-table').innerHTML = items.map(item => `
        <tr>
          <td>${esc(item.title)}</td>
          <td>${esc(item.type)}</td>
          <td>${item.is_free ? '—' : '$' + parseFloat(item.price_usd || 0).toFixed(2)}</td>
          <td>${item.is_free ? 'Yes' : 'No'}</td>
          <td>${item.is_active ? '✓' : '✗'}</td>
          <td class="actions">
            <button class="btn-sm btn-outline" onclick="openEditModal('${item.id}')">Edit</button>
            <button class="btn-sm btn-outline" onclick="toggleActive('${item.id}', ${!item.is_active})">${item.is_active ? 'Deactivate' : 'Activate'}</button>
            <button class="btn-sm btn-danger" onclick="deleteContent('${item.id}')">Delete</button>
          </td>
        </tr>
      `).join('');
    } catch (err) {
      console.error(err);
    }
  }

  async function uploadContent() {
    const title = document.getElementById('upload-title').value.trim();
    if (!title) { alert('Title required'); return; }

    const form = new FormData();
    form.append('title', title);
    form.append('description', document.getElementById('upload-desc').value);
    form.append('type', document.getElementById('upload-type').value);
    form.append('is_free', document.getElementById('upload-free').checked);
    form.append('price_usd', document.getElementById('upload-price').value);

    const file = document.getElementById('upload-file').files[0];
    const thumb = document.getElementById('upload-thumb').files[0];
    if (file) form.append('file', file);
    if (thumb) form.append('thumbnail', thumb);

    const btn = document.getElementById('upload-btn');
    const prog = document.getElementById('upload-progress');
    const bar = document.getElementById('progress-bar');
    btn.disabled = true;
    prog.style.display = 'block';
    bar.style.width = '30%';

    try {
      const xhr = new XMLHttpRequest();
      xhr.open('POST', `${API_BASE}/api/admin/content`);
      xhr.setRequestHeader('X-Admin-Key', adminToken);
      xhr.upload.onprogress = (e) => {
        if (e.lengthComputable) bar.style.width = Math.round((e.loaded / e.total) * 100) + '%';
      };
      xhr.onload = () => {
        btn.disabled = false;
        prog.style.display = 'none';
        bar.style.width = '0%';
        if (xhr.status === 401) { logout(); return; }
        if (xhr.status >= 400) {
          const err = JSON.parse(xhr.responseText);
          alert(err.error || 'Upload failed');
          return;
        }
        document.getElementById('upload-title').value = '';
        document.getElementById('upload-desc').value = '';
        document.getElementById('upload-file').value = '';
        document.getElementById('upload-thumb').value = '';
        loadContent();
      };
      xhr.onerror = () => { btn.disabled = false; alert('Upload failed'); };
      xhr.send(form);
    } catch (err) {
      btn.disabled = false;
      alert(err.message);
    }
  }

  async function toggleActive(id, active) {
    await fetch(`${API_BASE}/api/admin/content/${id}`, {
      method: 'PATCH',
      headers: { ...headers(), 'Content-Type': 'application/json' },
      body: JSON.stringify({ is_active: active }),
    });
    loadContent();
  }

  async function deleteContent(id) {
    if (!confirm('Soft-delete this content item?')) return;
    await fetch(`${API_BASE}/api/admin/content/${id}`, { method: 'DELETE', headers: headers() });
    loadContent();
  }

  // Edit modal functions
  function openEditModal(id) {
    const item = window.lastContentList?.find(i => i.id === id);
    if (!item) return alert('Item not found');
    document.getElementById('edit-id').value = item.id;
    document.getElementById('edit-title').value = item.title || '';
    document.getElementById('edit-desc').value = item.description || '';
    document.getElementById('edit-price').value = item.price_usd || 0;
    document.getElementById('edit-free').checked = !!item.is_free;
    document.getElementById('edit-active').checked = !!item.is_active;
    document.getElementById('edit-backdrop').style.display = 'flex';
  }

  function closeEditModal() {
    document.getElementById('edit-backdrop').style.display = 'none';
  }

  async function submitEdit() {
    const id = document.getElementById('edit-id').value;
    const payload = {
      title: document.getElementById('edit-title').value.trim(),
      description: document.getElementById('edit-desc').value.trim(),
      price_usd: document.getElementById('edit-price').value,
      is_free: document.getElementById('edit-free').checked,
      is_active: document.getElementById('edit-active').checked,
    };
    try {
      const res = await fetch(`${API_BASE}/api/admin/content/${id}`, {
        method: 'PATCH',
        headers: { ...headers(), 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      if (res.status === 401) { logout(); return; }
      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.error || 'Update failed');
      }
      closeEditModal();
      loadContent();
      alert('Updated');
    } catch (err) {
      alert(err.message);
    }
  }

  async function loadOrders() {
    try {
      const res = await fetch(`${API_BASE}/api/admin/orders`, { headers: headers() });
      if (res.status === 401) { logout(); return; }
      let orders = await res.json();
      const filter = document.getElementById('order-filter').value;
      if (filter === 'pending') orders = orders.filter(o => o.status === 'pending');

      document.getElementById('orders-table').innerHTML = orders.map(o => {
        const badge = o.status === 'verified' ? 'badge-verified' : o.status === 'rejected' ? 'badge-rejected' : 'badge-pending';
        const label = o.status === 'verified' ? '✅ Verified' : o.status === 'rejected' ? '❌ Rejected' : '🟡 Pending';
        const date = new Date(o.created_at).toLocaleString();
        const title = o.content_items?.title || '—';
        return `
        <tr>
          <td>${date}</td>
          <td>${esc(title)}</td>
          <td>${esc(o.telegram_handle || '—')}</td>
          <td>${esc(o.payment_method)}</td>
          <td style="max-width:120px;overflow:hidden;text-overflow:ellipsis">${esc(o.transaction_id || '—')}</td>
          <td><span class="badge ${badge}">${label}</span></td>
          <td class="actions">
            ${o.status === 'pending' ? `
              <button class="btn-sm" onclick="verifyOrder('${o.id}')">Verify</button>
              <button class="btn-sm btn-danger" onclick="rejectOrder('${o.id}')">Reject</button>
            ` : '—'}
          </td>
        </tr>`;
      }).join('') || '<tr><td colspan="7" style="color:var(--text-muted)">No orders yet</td></tr>';
    } catch (err) {
      console.error(err);
    }
  }

  async function verifyOrder(id) {
    if (!confirm('Verify this order and send download link via Telegram?')) return;
    try {
      const res = await fetch(`${API_BASE}/api/admin/orders/${id}/verify`, { method: 'POST', headers: headers() });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);
      alert('Verified! Link token: ' + data.link_token);
      loadOrders();
    } catch (err) {
      alert(err.message);
    }
  }

  async function rejectOrder(id) {
    if (!confirm('Reject this order?')) return;
    await fetch(`${API_BASE}/api/admin/orders/${id}/reject`, { method: 'POST', headers: headers() });
    loadOrders();
  }

  function esc(s) {
    const d = document.createElement('div');
    d.textContent = s || '';
    return d.innerHTML;
  }
</script>

<!-- Edit modal markup (kept minimal and non-intrusive) -->
<div id="edit-backdrop" class="edit-modal-backdrop" style="display:none;">
  <div class="edit-modal">
    <h3>Edit content</h3>
    <input id="edit-id" type="hidden" />
    <label>Title</label>
    <input id="edit-title" type="text" />
    <label>Description</label>
    <textarea id="edit-desc" rows="3"></textarea>
    <label>Price (USD)</label>
    <input id="edit-price" type="number" step="0.01" />
    <label style="display:flex;gap:0.5rem;align-items:center"><input id="edit-free" type="checkbox" /> Free</label>
    <label style="display:flex;gap:0.5rem;align-items:center"><input id="edit-active" type="checkbox" /> Active</label>
    <div style="margin-top:0.75rem;display:flex;gap:0.5rem;">
      <button onclick="submitEdit()" class="btn">Save</button>
      <button onclick="closeEditModal()" class="btn-outline">Cancel</button>
    </div>
  </div>
</div>

</body>
</html>
